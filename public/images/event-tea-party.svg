<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" role="img" aria-label="Princess Tea Party event poster">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcecf3"/><stop offset="1" stop-color="#c8daea"/>
    </linearGradient>
  </defs>
  <rect width="600" height="750" fill="url(#sky)"/>
  <!-- bunting -->
  <path d="M0 40 Q150 90 300 40 Q450 90 600 40" fill="none" stroke="#001d61" stroke-width="3"/>
  <g fill="#f6a6c9"><path d="M60 52l16 34 -32 0z"/><path d="M300 62l16 34 -32 0z"/><path d="M540 52l16 34 -32 0z"/></g>
  <g fill="#3d6b9e"><path d="M140 66l16 34 -32 0z"/><path d="M380 64l16 34 -32 0z"/></g>
  <g fill="#d9a441"><path d="M220 70l16 34 -32 0z"/><path d="M460 62l16 34 -32 0z"/></g>
  <!-- Eiffel tower silhouette -->
  <g fill="none" stroke="#001d61" stroke-width="7" stroke-linecap="round" opacity="0.9">
    <path d="M300 150 L260 420 M300 150 L340 420"/>
    <path d="M275 260 Q300 285 325 260"/>
    <path d="M262 330 Q300 365 338 330"/>
    <path d="M260 420 Q300 330 340 420"/>
    <path d="M300 150 L300 120"/>
  </g>
  <!-- teacup -->
  <g transform="translate(300 520)">
    <ellipse cx="0" cy="52" rx="120" ry="14" fill="#e08aad" opacity="0.35"/>
    <path d="M-85 -20 Q-85 55 0 55 Q85 55 85 -20 Z" fill="#ffffff" stroke="#001d61" stroke-width="6"/>
    <path d="M85 -6 q46 4 0 44" fill="none" stroke="#001d61" stroke-width="6"/>
    <path d="M-60 -2 q10 14 30 8 q22 -8 34 2 q18 10 36 -4" fill="none" stroke="#f6a6c9" stroke-width="6" stroke-linecap="round"/>
    <g stroke="#3d6b9e" stroke-width="5" fill="none" stroke-linecap="round">
      <path d="M-24 -46 q8 -12 0 -22"/><path d="M0 -52 q8 -12 0 -22"/><path d="M24 -46 q8 -12 0 -22"/>
    </g>
  </g>
  <!-- macaron -->
  <g transform="translate(120 620)">
    <ellipse cx="0" cy="0" rx="46" ry="20" fill="#f0a0bc"/>
    <ellipse cx="0" cy="12" rx="46" ry="20" fill="#e08aad"/>
    <ellipse cx="0" cy="6" rx="44" ry="10" fill="#fdfbf8"/>
  </g>
  <!-- crown -->
  <g transform="translate(478 616)" fill="#d9a441" stroke="#b3822a" stroke-width="3">
    <path d="M-50 24 L-40 -18 L-14 8 L0 -30 L14 8 L40 -18 L50 24 Z"/>
    <rect x="-50" y="24" width="100" height="14" rx="6"/>
  </g>
  <text x="300" y="710" text-anchor="middle" font-family="Georgia, 'Playfair Display', serif" font-size="34" font-style="italic" fill="#001d61">Princess Tea Party</text>
</svg>
